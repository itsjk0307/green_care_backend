services:
  postgres:
    image: postgres:15
    container_name: greencare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: greencare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: greencare-backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./:/app
      - nas_storage:/mnt/nas

volumes:
  postgres_data:
  nas_storage:
